/* CARD DESIGN */

.card:hover {

}

/* Headings */
.card h3 {
  font-size: 26px;
  margin-bottom: 15px;
  color: #222;
}

/* Text */
.card p {
  font-size: 16px;
  color: #555;
  margin-bottom: 25px;
}

/* BUTTON */
.btn {
  text-decoration: none;
  display: inline-block;
  padding: 12px 22px;
  background: #4a6cf7;
  color: #fff;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  background: #354ee2;
}

/* Disabled Button */
.btn.disabled {
  background: #b7bfd8;
  pointer-events: none;
}

<script>
// Handle Affiliate IDs for all active product links
const affLinks = document.querySelectorAll(".aff-link");

// 1. Check URL params
const params = new URLSearchParams(window.location.search);
let ref = params.get("ref");

// 2. Fallback to localStorage
if (!ref) {
  ref = localStorage.getItem("affiliate");
}

// 3. Apply to all links if ref exists
if (ref) {
  affLinks.forEach(link => {
    const currentUrl = new URL(link.href);
    currentUrl.searchParams.set("ref", ref);
    link.href = currentUrl.toString();
  });
}
</script>
