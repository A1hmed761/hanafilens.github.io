<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products – Hanafi Lens</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: #f5f7fb;
      color: #333;
      line-height: 1.6;
    }

    a { text-decoration: none; }

    /* --- HEADER --- */
    header {
      background: #0b3d3a;
      padding: 15px 0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      gap: 15px;
    }

    @media (min-width: 768px) {
      .nav-container { flex-direction: row; justify-content: space-between; }
    }

    .logo { color: #fff; font-size: 1.5rem; font-weight: 700; letter-spacing: .5px; }

    nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    nav a {
      color: #d7ffef;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 8px 15px;
      border-radius: 8px;
      transition: 0.3s;
    }

    nav a:hover { color: #2cb67d; }
    nav a.active { background: #2cb67d; color: #fff; }

    /* --- PAGE TITLE --- */
    .page-header {
      text-align: center;
      padding: 60px 20px 20px;
    }

    .page-header h1 { font-size: 2.2rem; color: #0b3d3a; margin-bottom: 10px; }

    /* --- PRODUCTS GRID --- */
    .products-grid {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    /* Card is now tight around the thumbnail */
    .product-card {
      display: inline-block;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25), 0 30px 80px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 100%;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.3), 0 35px 90px rgba(0,0,0,0.25);
    }

    .product-card img {
      display: block;
      width: 100%;
      height: auto;
    }

    .product-card .btn-area {
      padding: 16px 20px;
      text-align: center;
      background: rgba(255,255,255,0.08);
    }

    .btn {
      display: inline-block;
      background: #0b3d3a;
      color: #fff;
      padding: 11px 30px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2cb67d;
      transform: translateY(-2px);
    }

    .status-msg {
      grid-column: 1 / -1;
      text-align: center;
      color: #888;
      font-style: italic;
      margin-top: 40px;
      padding: 20px;
      border-top: 1px solid #ddd;
    }

    /* --- FOOTER --- */
    footer {
      background: #0b3d3a;
      padding: 40px 20px;
      color: white;
      text-align: center;
      margin-top: 80px;
    }

    footer p { font-size: 0.9rem; color: #d7ffef; opacity: 0.8; }
  </style>
</head>

<body>

  <header>
    <div class="nav-container">
      <div class="logo">Hanafi Lens</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="blog.html">Blogs</a>
        <a href="contact.html">Contact us</a>
      </nav>
    </div>
  </header>

  <div class="page-header">
    <h1>Our Products</h1>
    <p>Premium resources for Arabic, Persian, and Islamic studies.</p>
  </div>

  <section class="products-grid">

    <div class="product-card">
      <img src="images/product.png" alt="Arabic & Persian Vocabulary Package" />
      <div class="btn-area">
        <a href="product.html" class="btn">View Details</a>
      </div>
    </div>

    <div class="status-msg">
      More products will appear here soon. Stay tuned for our Persian Verb series!
    </div>

  </section>

</body>
</html>
